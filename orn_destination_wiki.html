  attachEvents();
}

function renderHub() {
  const allDests = Object.entries(DESTINATIONS);
  const filtered = allDests.map(([region, dests]) => {
    let filteredDests = dests;
    if (currentRegion !== "ALL") filteredDests = region === currentRegion ? dests : [];
    if (searchQuery) filteredDests = filteredDests.filter(d => d.toLowerCase().includes(searchQuery.toLowerCase()));
    return [region, filteredDests];
  }).filter(([_, d]) => d.length > 0);

  const total = Object.values(DESTINATIONS).flat().length;

  return `
  <div class="top-nav">
    <div class="nav-logo">
      <div class="nav-logo-bars">
        ${["#1e3a5f","#185fa5","#1abc9c","#3b6d11","#ba7517","#a32d2d"].map((c, i) => `<div class="nav-bar" style="background:${c};height:${14+i*2}px"></div>`).join("")}
      </div>
      <span class="nav-wordmark">ORN</span>
    </div>
    <span class="nav-badge">Destination Wiki</span>
  </div>
  <div class="hub-hero">
    <h1>Destination Knowledge Hub</h1>
    <p>${total} destinations across 4 regions — everything your team needs to sell with confidence</p>
    <div class="hub-search">
      <input type="text" placeholder="Search destinations..." id="search-input" value="${searchQuery}" />
    </div>
  </div>
  <div class="region-tabs">
    ${["ALL","ASIA","EUROPE","INDIA","OCEANIA"].map(r => `<button class="rtab${currentRegion===r?" active":""}" data-region="${r}">${r === "ALL" ? "All regions" : r}</button>`).join("")}
  </div>
  <div class="hub-body">
    ${filtered.map(([region, dests]) => `
      <div class="region-label">${region}</div>
      <div class="dest-grid">
        ${dests.map(d => `
          <div class="dest-card${d==="Bali"?" featured":""}" data-dest="${d}">
            <span class="flag">${FLAGS[d]||"🌍"}</span>
            <div class="name">${d}</div>
            ${d==="Bali"?`<span class="built-badge"><i class="ti ti-check" style="font-size:10px"></i> Full guide ready</span>`:`<span class="region-tag" style="font-size:11px;color:var(--color-text-tertiary)">Coming soon</span>`}
          </div>
        `).join("")}
      </div>
    `).join("")}
  </div>`;
}

function renderComingSoon(dest) {
  return `
  <div class="top-nav">
    <div class="nav-logo">
      <div class="nav-logo-bars">
        ${["#1e3a5f","#185fa5","#1abc9c","#3b6d11","#ba7517","#a32d2d"].map((c, i) => `<div class="nav-bar" style="background:${c};height:${14+i*2}px"></div>`).join("")}
      </div>
      <span class="nav-wordmark">ORN</span>
    </div>
    <span class="nav-badge">Destination Wiki</span>
  </div>
  <div class="dest-back" id="back-btn"><i class="ti ti-arrow-left"></i> All destinations</div>
  <div class="coming-soon-overlay">
    <i class="ti ti-map-pin cs-icon" aria-hidden="true"></i>
    <div class="cs-title">${FLAGS[dest]||"🌍"} ${dest}</div>
    <div class="cs-text">This destination guide is being built. It will follow the same full 11-section format as the Bali template.</div>
    <div style="margin-top:1.5rem">
      <button onclick="sendPrompt('Build the full destination fact sheet for ${dest} using the same structure as Bali')" style="font-size:13px;padding:10px 20px;border-radius:var(--border-radius-md);cursor:pointer">
        Build ${dest} guide now ↗
      </button>
    </div>
  </div>`;
}

function attachEvents() {
  document.querySelectorAll(".rtab").forEach(btn => {
    btn.addEventListener("click", () => { currentRegion = btn.dataset.region; render(); });
  });
  document.querySelectorAll(".dest-card").forEach(card => {
    card.addEventListener("click", () => {
      const dest = card.dataset.dest;
      if (dest === "Bali") { currentView = "bali"; }
      else { currentView = dest; }
      render();
      window.scrollTo(0, 0);
    });
  });
  const searchInput = document.getElementById("search-input");
  if (searchInput) {
    searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; render(); });
  }
  const backBtn = document.getElementById("back-btn");
  if (backBtn) {
    backBtn.addEventListener("click", () => { currentView = "hub"; render(); window.scrollTo(0,0); });
  }
}

render();
</script>
